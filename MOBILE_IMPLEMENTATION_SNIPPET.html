<!-- Mobile Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- 4. ADD THIS BEFORE CLOSING </body> TAG -->
<script src="mobile-dashboard.js"></script>

<!-- OR paste this inline JavaScript: -->
<script>
(function() {
  'use strict';
  
  // Mobile Menu Toggle
  function initMobileMenu() {
    const menuBtn = document.getElementById('menu-btn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    
    if (!menuBtn || !sidebar) return;
    
    menuBtn.addEventListener('click', () => {
      const isOpen = sidebar.classList.toggle('open');
      sidebarOverlay?.classList.toggle('active', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });
    
    sidebarOverlay?.addEventListener('click', closeSidebar);
    
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        if (window.innerWidth <= 900) closeSidebar();
      });
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && sidebar.classList.contains('open')) {
        closeSidebar();
      }
    });
    
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay?.classList.remove('active');
      document.body.style.overflow = '';
    }
  }
  
  // Resize Handler
  function initResizeHandler() {
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (window.innerWidth > 900) {
          document.getElementById('sidebar')?.classList.remove('open');
          document.getElementById('sidebar-overlay')?.classList.remove('active');
          document.body.style.overflow = '';
        }
      }, 250);
    });
  }
  
  // Swipe Gestures
  function initSwipeGestures() {
    let touchStartX = 0, touchEndX = 0;
    
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    
    document.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, { passive: true });
    
    function handleSwipe() {
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebar-overlay');
      if (!sidebar || window.innerWidth > 900) return;
      
      const swipeThreshold = 50;
      
      if (touchStartX < 50 && touchEndX - touchStartX > swipeThreshold) {
        sidebar.classList.add('open');
        sidebarOverlay?.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
      
      if (sidebar.classList.contains('open') && touchStartX - touchEndX > swipeThreshold) {
        sidebar.classList.remove('open');
        sidebarOverlay?.classList.remove('active');
        document.body.style.overflow = '';
      }
    }
  }
  
  // Viewport Height Fix
  function fixViewportHeight() {
    const setVH = () => {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    };
    setVH();
    window.addEventListener('resize', setVH);
    window.addEventListener('orientationchange', setVH);
  }
  
  // Initialize
  function init() {
    console.log('📱 Initializing mobile functionality...');
    initMobileMenu();
    initResizeHandler();
    initSwipeGestures();
    fixViewportHeight();
    console.log('✅ Mobile functionality ready');
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
