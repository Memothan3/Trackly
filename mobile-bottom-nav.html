<!-- Mobile Overlay (for sidebar) -->
<div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileSidebar()"></div>

<!-- Mobile Menu Button (Add to topbar) -->
<!-- Add this inside your .topbar element, before .page-title -->
<button class="menu-btn" id="menu-btn" onclick="toggleMobileSidebar()">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
  </svg>
</button>

<script>
// Mobile Navigation Functions
function toggleMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-overlay');
  
  sidebar.classList.toggle('open');
  overlay.classList.toggle('active');
  
  // Prevent body scroll when sidebar is open
  if (sidebar.classList.contains('open')) {
    document.body.style.overflow = 'hidden';
  } else {
    document.body.style.overflow = '';
  }
}

function closeMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-overlay');
  
  sidebar.classList.remove('open');
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

// Update mobile nav active state
function updateMobileNav(pageName) {
  const mobileNavItems = document.querySelectorAll('.mobile-nav-item');
  mobileNavItems.forEach(item => {
    if (item.dataset.page === pageName) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
}

// Close sidebar when clicking nav item on mobile
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    if (window.innerWidth <= 768) {
      closeMobileSidebar();
    }
  });
});

// Handle window resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (window.innerWidth > 768) {
      closeMobileSidebar();
    }
  }, 250);
});

// Prevent scroll on touch move when sidebar is open (iOS fix)
document.addEventListener('touchmove', (e) => {
  const sidebar = document.getElementById('sidebar');
  if (sidebar.classList.contains('open') && !sidebar.contains(e.target)) {
    e.preventDefault();
  }
}, { passive: false });
</script>

<style>
/* Additional mobile-specific styles */
.mobile-nav-add {
  position: relative;
}

.mobile-nav-add span {
  display: none;
}

/* Smooth transitions */
.sidebar {
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.mobile-overlay {
  transition: opacity 0.2s ease-out;
}

/* iOS safe area */
@supports (padding: max(0px)) {
  .mobile-bottom-nav {
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }
}

/* Prevent text selection on mobile nav */
.mobile-nav-item {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

/* Active state animation */
.mobile-nav-item.active {
  animation: bounceIn 0.3s ease-out;
}

@keyframes bounceIn {
  0% {
    transform: scale(0.9);
  }
  50% {
    transform: scale(1.05);
  }
  100% {
    transform: scale(1);
  }
}
</style>
